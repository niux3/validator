{% extends './partials/content_layout.html' %}

{% block personnal_script %}
<script id="script_example">
    window.addEventListener('DOMContentLoaded', function(){
        // simulation ajax
        document.querySelector('.button-display-form').addEventListener('click', e =>{
            document.querySelector('#container-form').innerHTML = document.querySelector("#tplform").innerHTML;
            e.currentTarget.style.display = 'none';
        })
        let options = {
            fields : {
                'firstname': {
                    "notempty" : {
                        "error" : "ce champs ne doit pas être vide"
                    }
                },
                'lastname': {
                    "notempty" : {
                        "error" : "ce champs ne doit pas être vide"
                    }
                },
            }
        };
        let validate = new Validator(options);
        validate.form();
        document.querySelector('#container-form').addEventListener('submit', e =>{
            if(e.target.closest('form')){
                let $currentForm = e.target.closest('form');
                validate.addRequireForm($currentForm);
                validate.checkForm($currentForm, e);
            }
        });
    })
</script>
{% endblock personnal_script %}
